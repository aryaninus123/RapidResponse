services:
  - type: web
    name: rapidresponse-api
    runtime: python
    plan: free
    pythonVersion: "3.11.9"
    buildCommand: pip install -r requirements-minimal.txt
    startCommand: uvicorn main_minimal:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: rapidresponse-db
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: LOG_LEVEL
        value: INFO
      - key: FRONTEND_URL
        value: https://your-app.vercel.app  # Update after Vercel deploy

databases:
  - name: rapidresponse-db
    plan: free
    databaseName: rapidrespond
